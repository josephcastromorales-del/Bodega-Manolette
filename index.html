<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bodega Pro | Panel de Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PANTALLA DE LOGIN (REAL) -->
    <div id="loginScreen">
        <div class="login-box">
            <img src="manolette-imagen.png" alt="Logo" style="width: 120px; margin-bottom: 1rem;">
            <h2>Bienvenido</h2>
            <p>Inicia sesión para gestionar la bodega</p>
            <form id="loginForm">
                <div style="margin-bottom: 1rem; text-align: left;">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="admin@empresa.com" required>
                </div>
                <div style="margin-bottom: 1.5rem; text-align: left;">
                    <label>Contraseña</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btnLogin">Entrar al Sistema</button>
                <p id="loginError" style="color: var(--danger); margin-top: 1rem; display: none;">Credenciales incorrectas</p>
            </form>
        </div>
    </div>

    <!-- INTERFAZ DE LA APP (OCULTA INICIALMENTE) -->
    <div id="appInterface">
        <div class="main-layout">
            
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <h1>Bodega Pro</h1>
                
                <nav class="nav-menu">
                    <div class="nav-item active" onclick="showSection('dashboardView')">📦 Inventario</div>
                    <div class="nav-item owner-only" onclick="showSection('addView')" style="display: none;">➕ Agregar Producto</div>
                    <div class="nav-item" onclick="showSection('historyView')">🕒 Historial</div>
                </nav>

                <div style="margin-top: auto; padding-top: 2rem;">
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;" id="userDisplay"></p>
                    <button class="danger" onclick="logout()">Cerrar Sesión</button>
                </div>
            </aside>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="main-content">
                
                <!-- VISTA: TABLERO (KANBAN) -->
                <section id="dashboardView" class="content-section active">
                    <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                        <h2>Estado del Inventario</h2>
                        <div style="display: flex; gap: 10px; flex-grow: 1; max-width: 600px;">
                            <input type="text" id="buscador" placeholder="Buscar por nombre...">
                            <select id="filtroPiso" style="max-width: 150px;">
                                <option value="">Todos los Pisos</option>
                                <option value="piso1">Piso 1</option>
                                <option value="piso2">Piso 2</option>
                            </select>
                        </div>
                    </header>

                    <div class="dashboard">
                        <div class="column">
                            <h2>Llegaron <span id="count-llegaron">0</span></h2>
                            <div id="estado-llegaron" class="cards-container"></div>
                        </div>
                        <div class="column">
                            <h2>En Espera <span id="count-espera">0</span></h2>
                            <div id="estado-espera" class="cards-container"></div>
                        </div>
                        <div class="column">
                            <h2>Listos <span id="count-listos">0</span></h2>
                            <div id="estado-listos" class="cards-container"></div>
                        </div>
                    </div>
                </section>

                <!-- VISTA: AGREGAR (SOLO DUEÑO) -->
                <section id="addView" class="content-section">
                    <div style="background: white; padding: 2.5rem; border-radius: var(--radius); box-shadow: var(--shadow);">
                        <h2 style="margin-bottom: 1.5rem;">Nuevo Ingreso</h2>
                        <form id="productForm">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                <div>
                                    <label>Nombre del Producto</label>
                                    <input id="nombre" placeholder="Ej: Arroz 1kg" required>
                                </div>
                                <div>
                                    <label>Registrado por</label>
                                    <input id="quien" readonly>
                                </div>
                                <div>
                                    <label>Estado Inicial</label>
                                    <select id="estado">
                                        <option value="llegaron">Llegaron</option>
                                        <option value="espera">Espera</option>
                                        <option value="listos">Listos</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Ubicación (Piso)</label>
                                    <select id="piso">
                                        <option value="piso1">Piso 1</option>
                                        <option value="piso2">Piso 2</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Unidad de Medida</label>
                                    <select id="tipoCantidad">
                                        <option value="kg">Kilogramos</option>
                                        <option value="caja">Cajas / bultos</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Cantidad</label>
                                    <input id="cantidad" type="number" placeholder="0" required>
                                </div>
                            </div>
                            <button style="margin-top: 2rem;">Guardar en Inventario</button>
                        </form>
                    </div>
                </section>

                <!-- VISTA: HISTORIAL -->
                <section id="historyView" class="content-section">
                    <h2 style="margin-bottom: 1.5rem;">Actividad Reciente</h2>
                    <ul id="historial" class="historial-list"></ul>
                </section>

            </main>
        </div>
    </div>

    <!-- NOTIFICACIONES -->
    <div id="toast">Operación exitosa</div>

    <!-- Firebase SDK (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
