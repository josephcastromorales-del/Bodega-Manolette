<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manolette — Iniciar sesión</title>
    <link rel="icon" type="image/png" href="manolette-2.png">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        .login-form-group {
            display: flex;
            flex-direction: column;
            gap: .35rem;
            margin-bottom: .9rem;
        }

        .auth-error {
            color: #fca5a5;
            font-size: .85rem;
            text-align: center;
            min-height: 1.2em;
            margin-bottom: .5rem;
        }

        .login-btn {
            width: 100%;
            padding: .75rem;
            background: var(--accent, #4f46e5);
            color: white;
            border: none;
            border-radius: var(--r-md);
            font-weight: 700;
            font-size: 1rem;
            font-family: var(--font-sans, 'Inter', sans-serif);
            cursor: pointer;
            transition: var(--t);
            margin-top: .5rem;
        }

        .login-btn:hover:not(:disabled) {
            background: var(--accent-hover, #4338ca);
        }

        .login-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        .login-form-input, .login-form-select {
            width: 100%;
            box-sizing: border-box;
            padding: .65rem .75rem;
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-md);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: border-color var(--t);
        }

        .login-form-input:focus, .login-form-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-form-label {
            font-size: .85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .pass-wrapper {
            position: relative;
            width: 100%;
        }

        .pass-wrapper .login-form-input {
            padding-right: 2.75rem;
        }

        .toggle-pass {
            position: absolute;
            right: .75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, .4);
            padding: 0;
            line-height: 1;
        }

        .toggle-pass:hover {
            color: rgba(255, 255, 255, .8);
        }
    </style>
</head>

<body>
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-logo">
                <img src="manolette-imagen.png" alt="Manolette" class="sidebar-logo"
                    style="width: 100%; object-fit: cover; height: auto; margin: 0 auto;">
                <p style="margin: 10px auto; text-align: center;">Plataforma de gestión empresarial</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-target="loginForm">Iniciar sesión</button>
                <button class="auth-tab" data-target="registerForm">Crear cuenta</button>
            </div>

            <p class="auth-error" id="authError"></p>

            <!-- LOGIN -->
            <form id="loginForm" class="auth-form">
                <div class="login-form-group">
                    <label class="login-form-label" for="loginEmail">Correo electrónico</label>
                    <input class="login-form-input" type="email" id="loginEmail" placeholder="nombre@empresa.com"
                        required autocomplete="email">
                </div>
                <div class="login-form-group">
                    <label class="login-form-label" for="loginPass">Contraseña</label>
                    <div class="pass-wrapper">
                        <input class="login-form-input" type="password" id="loginPass" placeholder="••••••••" required
                            autocomplete="current-password">
                        <button type="button" class="toggle-pass" data-input="loginPass">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                height="16">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="login-btn" id="btnLogin" type="submit">Iniciar sesión</button>
            </form>

            <!-- REGISTRO -->
            <form id="registerForm" class="auth-form" style="display:none">
                <div class="login-form-group">
                    <label class="login-form-label" for="regNombre">Nombre completo</label>
                    <input class="login-form-input" type="text" id="regNombre" placeholder="Tu nombre" required>
                </div>
                <div class="login-form-group">
                    <label class="login-form-label" for="regEmail">Correo electrónico</label>
                    <input class="login-form-input" type="email" id="regEmail" placeholder="nombre@empresa.com" required
                        autocomplete="email">
                </div>
                <div class="login-form-group">
                    <label class="login-form-label" for="regPass">Contraseña</label>
                    <div class="pass-wrapper">
                        <input class="login-form-input" type="password" id="regPass" placeholder="Mínimo 6 caracteres"
                            required autocomplete="new-password">
                        <button type="button" class="toggle-pass" data-input="regPass">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                                height="16">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="login-form-group">
                    <label class="login-form-label" for="regRol">Rol en la empresa</label>
                    <select class="login-form-select" id="regRol">
                        <option value="empleado">Empleado</option>
                        <option value="supervisor">Supervisor</option>
                        <option value="dueño">Dueño / Administrador</option>
                    </select>
                </div>
                <button class="login-btn" id="btnReg" type="submit">Crear cuenta</button>
            </form>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="config.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
