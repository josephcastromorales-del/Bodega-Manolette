<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bodega</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MODAL PASSWORD -->
<div id="modalPassword">
    <div class="modal-box">
        <div class="box-ac">
            <button id="btnAtras" class="btn-atras">← Atrás</button>
            <h3>Contraseña</h3>
        </div>
        <input type="password" id="passwordInput" placeholder="Ingrese contraseña">
        <button id="passwordBtn">Entrar</button>
        <p id="passwordError">Incorrecta</p>
    </div>
</div>

<div class="app">

    <!-- MENU -->
    <aside class="container-menu">
        <h2>Bodega</h2>

        <input type="text" id="buscador" placeholder="Buscar producto">

        <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="llegaron">Llegaron</option>
            <option value="espera">Espera</option>
            <option value="listos">Listos</option>
        </select>

        <select id="filtroPiso">
            <option value="">Todos</option>
            <option value="piso1">Piso 1</option>
            <option value="piso2">Piso 2</option>
        </select>

        <ul>
            <li class="menu-item active" data-target="llegaron">Llegaron</li>
            <li class="menu-item" data-target="espera">En espera</li>
            <li class="menu-item" data-target="listos">Listos</li>
            <li class="menu-item" data-target="agregar">Agregar</li>
            <li class="menu-item" data-target="historialView">Historial</li>
        </ul>
    </aside>

    <!-- CONTENIDO -->
    <main class="container-content">

        <section id="llegaron" class="content active">
            <h2>Llegaron</h2>
            <div class="cards" id="estado-llegaron"></div>
        </section>

        <section id="espera" class="content">
            <h2>En espera</h2>
            <div class="cards" id="estado-espera"></div>
        </section>

        <section id="listos" class="content">
            <h2>Listos</h2>
            <div class="cards" id="estado-listos"></div>
        </section>

        <section id="agregar" class="content">
            <h2>Agregar producto</h2>
            <form id="productForm">
                <input id="nombre" placeholder="Producto" required>
                <input id="quien" placeholder="Quién lo agrega" required>
                <input id="hora" disabled>

                <select id="estado">
                    <option value="llegaron">Llegaron</option>
                    <option value="espera">Espera</option>
                    <option value="listos">Listos</option>
                </select>

                <select id="piso">
                    <option value="piso1">Piso 1</option>
                    <option value="piso2">Piso 2</option>
                </select>

                <select id="tipoCantidad">
                    <option value="kg">Kilos</option>
                    <option value="caja">Cajas</option>
                </select>

                <input id="cantidad" type="number" placeholder="Cantidad" required>
                <button>Agregar</button>
            </form>
        </section>

        <section id="historialView" class="content">
            <h2>Historial</h2>
            <ul id="historial"></ul>
        </section>

    </main>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
